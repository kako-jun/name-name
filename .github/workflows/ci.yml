name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  parser:
    name: Parser (Rust)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: parser
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            parser/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('parser/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - run: cargo fmt --check

      - run: cargo clippy -- -D warnings

      - run: cargo test

  frontend:
    name: Frontend (TypeScript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - run: npm run type-check

      - run: npm test -- --run

  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - run: uv sync --frozen

      - name: Import smoke test
        run: uv run python -c "from app.main import app; print('FastAPI app import OK')"
