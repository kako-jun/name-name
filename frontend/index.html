<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Name x Name</title>
    <!-- #239 (manga-desk theme): エディタ UI 用の和文フォント。プレイヤー側は per-game で
         動的 link を inject するので、ここでは「漫画家の机」テーマ用に preload する。
         Klee One: 見出し・タブ等の手書き寄り丸ゴシック。
         Hina Mincho: 原稿用紙風の本文に使う明朝。 -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Klee+One:wght@400;600&family=Hina+Mincho&display=swap"
      rel="stylesheet"
    />
  </head>
  <!-- #394: React マウント前の初期背景を黒にする。プレイヤーの見た目デフォルトは黒（dark）で、
       theo-hayami 等のダークな埋め込み先で pre-JS の白フラッシュが額縁から浮くのを防ぐ。
       インライン style なので CSS バンドル読込前（HTML パース時）から効く。マウント後は各
       画面のルート要素（エディタ light は bg-white 等）が全面を覆うので standalone light への
       実害は無い（?theme=light 埋め込みも app root が覆う）。 -->
  <body style="background-color: #000000">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
